name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Prepare Web Directory
        run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/ || true
          cp spacemath.png www/ || true

      - name: Install Capacitor & Android Project
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "SpaceMath" "com.spacemath.app" --web-dir www
          npx cap add android
          npx cap copy android

      - name: Fix Kotlin Duplicate Classes
        run: |
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          sed -i 's/dependencies {/dependencies {\n    implementation(platform("org.jetbrains.kotlin:kotlin-bom:1.8.22"))/' android/app/build.gradle

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          # שינוי שם הקובץ בתוך תיקיית הפלט
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/spacemath.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: spacemath-app-package # זה יהיה שם ה-ZIP שתוריד
          path: android/app/build/outputs/apk/debug/spacemath.apk
