<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערך 22 אובייקטים היפר-ריאליסטיים</title>
    <style>
        body { margin: 0; background: #000; color: #00f2ff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; display: flex; }
        #sidebar { width: 280px; height: 100vh; overflow-y: auto; background: #05050a; border-left: 2px solid #1a1a2e; padding: 15px; z-index: 100; box-shadow: 5px 0 20px rgba(0,242,255,0.2); }
        .category { margin: 20px 0 10px; font-size: 14px; letter-spacing: 2px; color: #ff00ff; text-transform: uppercase; border-bottom: 1px solid #333; }
        button { width: 100%; text-align: right; background: rgba(255,255,255,0.05); border: 1px solid #222; color: #ccc; padding: 10px; margin: 3px 0; cursor: pointer; transition: 0.2s; border-radius: 4px; }
        button:hover { background: #00f2ff; color: #000; font-weight: bold; transform: translateX(-5px); }
        #canvas-container { flex-grow: 1; position: relative; background: radial-gradient(circle, #111 0%, #000 100%); }
        #info { position: absolute; bottom: 30px; left: 30px; pointer-events: none; }
        #obj-name { font-size: 48px; margin: 0; text-shadow: 0 0 20px #00f2ff; }
    </style>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
</head>
<body>

<div id="sidebar">
    <div class="category">מערכת השמש</div>
    <button onclick="load(0)">כוכב חמה</button>
    <button onclick="load(1)">נוגה</button>
    <button onclick="load(2)">כדור הארץ</button>
    <button onclick="load(3)">מאדים</button>
    <button onclick="load(4)">צדק</button>
    <button onclick="load(5)">שבתאי</button>
    <button onclick="load(6)">אורנוס</button>
    <button onclick="load(7)">נפטון</button>
    <button onclick="load(8)">פלוטו</button>

    <div class="category">אנומליות ובוסים</div>
    <button onclick="load(9)">השמש (Star)</button>
    <button onclick="load(10)">חור שחור (Black Hole)</button>
    <button onclick="load(11)">חור תולעת</button>
    <button onclick="load(12)">סופרנובה</button>
    <button onclick="load(13)">פאלסאר</button>
    <button onclick="load(14)">ערפילית (Nebula)</button>
    <button onclick="load(15)">קוואזר</button>

    <div class="category">אזורי סכנה</div>
    <button onclick="load(16)">חגורת אסטרואידים</button>
    <button onclick="load(17)">ענן אורט</button>
    <button onclick="load(18)">שביט</button>

    <div class="category">עולמות רחוקים</div>
    <button onclick="load(19)">Kepler-452b</button>
    <button onclick="load(20)">TRAPPIST-1e</button>
    <button onclick="load(21)">Proxima Centauri b</button>
</div>

<div id="canvas-container">
    <div id="info"><h1 id="obj-name">בחר אובייקט</h1></div>
</div>

<script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, (window.innerWidth - 280) / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth - 280, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    camera.position.z = 6;
    let currentObject = null;
    const clock = new THREE.Clock();

    // --- מנוע ה-Shaders והחומרים ההיפר-ריאליסטיים ---
    const Factory = {
        // יצירת פלנטה עם אטמוספירה (Fresnel Effect)
        createPlanet: (color, atmosColor, size=1.8) => {
            const group = new THREE.Group();
            const geo = new THREE.SphereGeometry(size, 64, 64);
            const mat = new THREE.MeshStandardMaterial({ 
                color: color, metalness: 0.1, roughness: 0.8 
            });
            const mesh = new THREE.Mesh(geo, mat);
            
            // שכבת אטמוספירה זוהרת
            const atmosGeo = new THREE.SphereGeometry(size * 1.05, 64, 64);
            const atmosMat = new THREE.ShaderMaterial({
                vertexShader: `varying vec3 vNormal; void main() { vNormal = normalize(normalMatrix * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `varying vec3 vNormal; uniform vec3 color; void main() { float intensity = pow(0.6 - dot(vNormal, vec3(0,0,1.0)), 4.0); gl_FragColor = vec4(color, intensity); }`,
                uniforms: { color: { value: new THREE.Color(atmosColor) } },
                transparent: true, side: THREE.BackSide
            });
            group.add(mesh, new THREE.Mesh(atmosGeo, atmosMat));
            return group;
        },

        // חור שחור עם דיסקת ספיחה דינמית
        createBlackHole: () => {
            const g = new THREE.Group();
            const core = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), new THREE.MeshBasicMaterial({color: 0x000000}));
            const ringGeo = new THREE.TorusGeometry(2.8, 0.3, 2, 100);
            const ringMat = new THREE.ShaderMaterial({
                uniforms: { time: { value: 0 } },
                vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
                fragmentShader: `varying vec2 vUv; uniform float time; void main(){ 
                    float twist = sin(vUv.x * 20.0 + time * 5.0);
                    gl_FragColor = vec4(1.0, 0.4 + twist*0.2, 0.0, 0.8); 
                }`,
                transparent: true, blending: THREE.AdditiveBlending
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI/2.2;
            g.add(core, ring); g.userData.update = (t) => { ringMat.uniforms.time.value = t; ring.rotation.z += 0.01; };
            return g;
        },

        // שמש פועמת
        createSun: () => {
            const geo = new THREE.SphereGeometry(2, 64, 64);
            const mat = new THREE.ShaderMaterial({
                uniforms: { time: { value: 0 } },
                vertexShader: `varying vec3 vNormal; void main(){ vNormal = normal; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
                fragmentShader: `varying vec3 vNormal; uniform float time; void main(){
                    float pulse = 0.8 + sin(time * 2.0) * 0.2;
                    gl_FragColor = vec4(vec3(1.0, 0.6, 0.1) * pulse, 1.0);
                }`,
                blending: THREE.AdditiveBlending
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.userData.update = (t) => mat.uniforms.time.value = t;
            return mesh;
        }
    };

    const data = [
        { name: "כוכב חמה", func: () => Factory.createPlanet(0x888888, 0x555555, 0.8) },
        { name: "נוגה", func: () => Factory.createPlanet(0xe3bb76, 0xffaa00, 1.4) },
        { name: "כדור הארץ", func: () => Factory.createPlanet(0x1122ff, 0x00ffff, 1.5) },
        { name: "מאדים", func: () => Factory.createPlanet(0xff4400, 0xff8800, 1.2) },
        { name: "צדק", func: () => Factory.createPlanet(0xd8ca9d, 0xaa8866, 2.2) },
        { name: "שבתאי", func: () => { 
            const g = Factory.createPlanet(0xdfd3a3, 0x887755, 1.8);
            const ring = new THREE.Mesh(new THREE.RingGeometry(2.2, 3.5, 64), new THREE.MeshBasicMaterial({color: 0x998877, side: THREE.DoubleSide, transparent:true, opacity:0.6}));
            ring.rotation.x = Math.PI/2; g.add(ring); return g;
        }},
        { name: "אורנוס", func: () => Factory.createPlanet(0xafeeee, 0xffffff, 1.6) },
        { name: "נפטון", func: () => Factory.createPlanet(0x4169e1, 0x0000ff, 1.6) },
        { name: "פלוטו", func: () => Factory.createPlanet(0xdddddd, 0x333333, 0.6) },
        { name: "השמש", func: () => Factory.createSun() },
        { name: "חור שחור", func: () => Factory.createBlackHole() },
        { name: "חור תולעת", func: () => {
            const m = new THREE.Mesh(new THREE.TorusKnotGeometry(1.5, 0.4, 100, 16), new THREE.MeshBasicMaterial({color: 0x00f2ff, wireframe: true}));
            return m;
        }},
        { name: "סופרנובה", func: () => {
            const g = new THREE.Points(new THREE.BufferGeometry().setFromPoints(Array.from({length:5000}, () => new THREE.Vector3().setFromSphericalCoords(Math.random()*3, Math.random()*Math.PI, Math.random()*Math.PI*2))), new THREE.PointsMaterial({color: 0xff4400, size: 0.05}));
            return g;
        }},
        { name: "פאלסאר", func: () => {
            const g = new THREE.Group();
            g.add(new THREE.Mesh(new THREE.SphereGeometry(0.5,32,32), new THREE.MeshBasicMaterial({color:0xffffff})));
            const beam = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.5, 12), new THREE.MeshBasicMaterial({color:0x00ffff, transparent:true, opacity:0.4}));
            g.add(beam); return g;
        }},
        { name: "ערפילית", func: () => {
            const g = new THREE.Points(new THREE.BufferGeometry().setFromPoints(Array.from({length:10000}, () => new THREE.Vector3((Math.random()-0.5)*10, (Math.random()-0.5)*10, (Math.random()-0.5)*10))), new THREE.PointsMaterial({color: 0xff00ff, size: 0.02, transparent: true, opacity: 0.3}));
            return g;
        }},
        { name: "קוואזר", func: () => Factory.createBlackHole() },
        { name: "חגורת אסטרואידים", func: () => {
            const g = new THREE.Group();
            for(let i=0; i<100; i++){
                const m = new THREE.Mesh(new THREE.DodecahedronGeometry(0.1), new THREE.MeshStandardMaterial({color:0x666666}));
                m.position.setFromSphericalCoords(4, Math.PI/2 + (Math.random()-0.5)*0.2, Math.random()*Math.PI*2);
                g.add(m);
            }
            return g;
        }},
        { name: "ענן אורט", func: () => {
            return new THREE.Points(new THREE.BufferGeometry().setFromPoints(Array.from({length:2000}, () => new THREE.Vector3().setFromSphericalCoords(6, Math.random()*Math.PI, Math.random()*Math.PI*2))), new THREE.PointsMaterial({color:0xffffff, size:0.02}));
        }},
        { name: "שביט", func: () => {
            const g = new THREE.Group();
            g.add(new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color:0xffffff})));
            return g;
        }},
        { name: "Kepler-452b", func: () => Factory.createPlanet(0x225522, 0x00ff00, 1.7) },
        { name: "TRAPPIST-1e", func: () => Factory.createPlanet(0x552222, 0xff4400, 1.4) },
        { name: "Proxima Centauri b", func: () => Factory.createPlanet(0x444466, 0x8888ff, 1.3) }
    ];

    window.load = (idx) => {
        if(currentObject) scene.remove(currentObject);
        const item = data[idx];
        document.getElementById('obj-name').innerText = item.name;
        currentObject = item.func();
        scene.add(currentObject);
    };

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        if(currentObject) {
            currentObject.rotation.y += 0.005;
            if(currentObject.userData.update) currentObject.userData.update(t);
        }
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
