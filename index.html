<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="spacemath.png">
    <link rel="icon" type="image/png" href="spacemath.png">
    
    <title>מסע הכפל: Mobile Pro</title>
    <style>
        /* מניעת בחירת טקסט וסימון כחול בלחיצה */
        * { -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; outline: none; }
        
        body { 
            margin: 0; overflow: hidden; background: #000; 
            font-family: system-ui, -apple-system, sans-serif; 
            touch-action: none; position: fixed; width: 100%; height: 100%;
        }

        #ui-layer { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; pointer-events: none; z-index: 1000; }
        
        /* HUD - מותאם למגרעת של הטלפון */
        #top-hud { 
            width: 90%; display: flex; justify-content: space-between; 
            margin: calc(10px + env(safe-area-inset-top)) auto 0; 
            color: #00f2ff; font-size: 0.8rem; 
        }
        .hud-box { background: rgba(0, 40, 80, 0.7); padding: 8px 15px; border-radius: 15px; border: 1px solid #00f2ff; backdrop-filter: blur(8px); }
        .stat-label { font-size: 0.6rem; display: block; opacity: 0.8; }
        
        #scan-info { text-align: center; margin-top: 10px; animation: fadeIn 1.5s ease-out; }
        #scan-title { color: #fff; font-weight: bold; font-size: 1.5rem; text-shadow: 0 0 15px #00f2ff; margin: 0; }
        #scan-desc { color: #00f2ff; font-size: 0.9rem; margin: 0; }

        #lower-controls { margin-top: auto; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        #mission-panel { 
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); 
            border-radius: 20px; padding: 20px 40px; 
            border: 1px solid rgba(0, 242, 255, 0.4); margin-bottom: 20px; text-align: center; 
        }
        #question { font-size: 4rem; color: #fff; margin: 0; font-weight: bold; }
        #answer-display { font-size: 3rem; color: #ff00de; font-weight: bold; min-height: 3.5rem; }

        /* מקלדת נומרית - אופטימיזציה למגע */
        #keyboard-container { 
            width: 100%; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(25px); 
            padding: 15px 5px calc(15px + env(safe-area-inset-bottom)); 
            border-top: 1px solid rgba(255, 255, 255, 0.1); pointer-events: auto; 
        }
        #numpad-row { display: flex; justify-content: center; gap: 6px; max-width: 600px; margin: 0 auto; direction: ltr; }
        
        .btn { 
            flex: 1; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.05); 
            color: white; font-size: 1.4rem; height: 60px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; transition: 0.1s; 
        }
        .btn:active { background: #00f2ff; color: #000; transform: scale(0.92); }
        .btn-go { background: linear-gradient(135deg, #00ff66, #00cc55); color: #000; font-weight: bold; flex: 2; }
        .btn-del { background: rgba(255, 68, 68, 0.25); color: #ff4444; flex: 1.3; }

        #feedback { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); color: #00ff66; font-size: 2.5rem; font-weight: bold; opacity: 0; pointer-events: none; text-align: center; z-index: 2000; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="top-hud">
        <div class="hud-box">
            <span class="stat-label">דרגת פיקוד</span>
            🎖️ <span id="rank">מתלמד</span>
        </div>
        <div class="hud-box">
            <span class="stat-label">מרחק מהבית</span>
            📍 <span id="dist">0</span> ק"מ
        </div>
    </div>

    <div id="scan-info">
        <p id="scan-title"></p>
        <p id="scan-desc"></p>
    </div>

    <div id="feedback">מעולה!</div>

    <div id="lower-controls">
        <div id="mission-panel">
            <div id="question"></div>
            <div id="answer-display">?</div>
        </div>
        <div id="keyboard-container">
            <div id="numpad-row">
                <div class="btn btn-del" onclick="clr()">X</div>
                <div class="btn" onclick="p(1)">1</div>
                <div class="btn" onclick="p(2)">2</div>
                <div class="btn" onclick="p(3)">3</div>
                <div class="btn" onclick="p(4)">4</div>
                <div class="btn" onclick="p(5)">5</div>
                <div class="btn" onclick="p(6)">6</div>
                <div class="btn" onclick="p(7)">7</div>
                <div class="btn" onclick="p(8)">8</div>
                <div class="btn" onclick="p(9)">9</div>
                <div class="btn" onclick="p(0)">0</div>
                <div class="btn btn-go" onclick="check()">GO 🚀</div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, universeGroup, stars;
    let score=0, target=0, input="", distance=0, warping=false, starSpd=0.5;
    let rx=0, ry=0, lx, ly, isDown=false;
    let playlist = [];

    const ranks = ["מתלמד", "צוער חלל", "סגן", "קפטן", "קומודור", "אדמירל", "אדמירל צי"];
    const praises = ["מעולה!", "בדיוק!", "מדהים!", "קפיצת הדרכה!", "בול!"];

    const catalog = [
        { name: "ערפילית אוריון", cat: "ענן גז כוכבי", color: 0x00f2ff, type: 'nebula' },
        { name: "שבתאי", cat: "ענק גז", color: 0xeeddaa, type: 'saturn' },
        { name: "חור שחור", cat: "סינגולריות", color: 0x000000, type: 'blackhole' },
        { name: "חגורת אסטרואידים", cat: "צביר סלעים", color: 0x888888, type: 'asteroids' },
        { name: "חור תולעת", cat: "עיוות חלל", color: 0xcc00ff, type: 'wormhole' },
        { name: "גלקסיית שביל החלב", cat: "צביר גלקטי", color: 0xffffff, type: 'galaxy' }
    ];

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 10000);
        camera.position.z = 250;
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        universeGroup = new THREE.Group();
        scene.add(universeGroup);

        const sGeo = new THREE.BufferGeometry();
        const sPos = [];
        for(let i=0; i<8000; i++) sPos.push((Math.random()-0.5)*5000, (Math.random()-0.5)*5000, (Math.random()-0.5)*5000);
        sGeo.setAttribute('position', new THREE.Float32BufferAttribute(sPos, 3));
        stars = new THREE.Points(sGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.8}));
        scene.add(stars);

        window.addEventListener('pointerdown', e => { if(e.clientY < window.innerHeight * 0.7) { isDown=true; lx=e.clientX; ly=e.clientY; }});
        window.addEventListener('pointermove', e => { if(!isDown) return; ry += (e.clientX - lx)*0.007; rx += (e.clientY - ly)*0.007; lx=e.clientX; ly=e.clientY; });
        window.addEventListener('pointerup', () => isDown=false);

        // מניעת גלילה של הדף
        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

        pickNext(); ask(); animate();
    }

    function spawn(obj) {
        universeGroup.clear();
        universeGroup.position.set(0, 25, -1000);
        document.getElementById('scan-title').innerText = obj.name;
        document.getElementById('scan-desc').innerText = "סיווג: " + obj.cat;

        if(obj.type === 'nebula') {
            const pGeo = new THREE.BufferGeometry(); const pP = [];
            for(let i=0; i<3000; i++) pP.push((Math.random()-0.5)*200, (Math.random()-0.5)*200, (Math.random()-0.5)*200);
            pGeo.setAttribute('position', new THREE.Float32BufferAttribute(pP, 3));
            universeGroup.add(new THREE.Points(pGeo, new THREE.PointsMaterial({color: obj.color, size: 4, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending})));
        } else if(obj.type === 'blackhole') {
            universeGroup.add(new THREE.Mesh(new THREE.SphereGeometry(30, 32, 32), new THREE.MeshBasicMaterial({color: 0x000000})));
            const d = new THREE.Mesh(new THREE.TorusGeometry(65, 5, 2, 100), new THREE.MeshBasicMaterial({color: 0xff6600, wireframe: true}));
            d.rotation.x = 1.5; universeGroup.add(d);
        } else if(obj.type === 'saturn') {
            universeGroup.add(new THREE.Mesh(new THREE.SphereGeometry(50, 32, 32), new THREE.MeshStandardMaterial({color: 0xeeddaa})));
            const r = new THREE.Mesh(new THREE.TorusGeometry(85, 10, 2, 100), new THREE.MeshBasicMaterial({color: 0x998877, transparent: true, opacity: 0.5}));
            r.rotation.x = 1.8; universeGroup.add(r);
        } else if(obj.type === 'asteroids') {
            for(let i=0; i<80; i++) {
                const a = new THREE.Mesh(new THREE.IcosahedronGeometry(Math.random()*6, 0), new THREE.MeshStandardMaterial({color: 0x777777}));
                a.position.set((Math.random()-0.5)*350, (Math.random()-0.5)*250, (Math.random()-0.5)*250);
                universeGroup.add(a);
            }
        } else if(obj.type === 'wormhole') {
            universeGroup.add(new THREE.Mesh(new THREE.TorusKnotGeometry(40, 15, 120, 20), new THREE.MeshBasicMaterial({color: 0xcc00ff, wireframe: true})));
        } else {
            const gGeo = new THREE.BufferGeometry(); const gP = [];
            for(let i=0; i<5000; i++) { let r=Math.random()*160, a=r*0.15; gP.push(Math.cos(a)*r, (Math.random()-0.5)*12, Math.sin(a)*r); }
            gGeo.setAttribute('position', new THREE.Float32BufferAttribute(gP, 3));
            universeGroup.add(new THREE.Points(gGeo, new THREE.PointsMaterial({color: 0xffffff, size: 1})));
        }
    }

    function ask() {
        let n1=Math.floor(Math.random()*8)+2, n2=Math.floor(Math.random()*9)+2;
        target=n1*n2;
        document.getElementById('question').innerText = `${n1} × ${n2}`;
        input=""; document.getElementById('answer-display').innerText = "?";
    }

    function p(n) { 
        if(navigator.vibrate) navigator.vibrate(10); 
        if(input.length<3) { input+=n; document.getElementById('answer-display').innerText=input; } 
    }
    
    function clr() { input=""; document.getElementById('answer-display').innerText="?"; }

    function check() {
        if(parseInt(input)===target) {
            if(navigator.vibrate) navigator.vibrate([30, 30]);
            score++; distance += 100000;
            document.getElementById('dist').innerText = distance.toLocaleString();
            let rIdx = Math.min(Math.floor(score / 5), ranks.length - 1);
            document.getElementById('rank').innerText = ranks[rIdx];

            const f = document.getElementById('feedback');
            f.innerText = praises[Math.floor(Math.random()*praises.length)] + "\n+100,000 ק\"מ";
            f.style.opacity = 1;

            warping=true;
            setTimeout(()=>{ 
                f.style.opacity = 0;
                warping=false; 
                universeGroup.position.z=-1000; 
                pickNext(); ask(); 
            }, 1000);
        } else {
            if(navigator.vibrate) navigator.vibrate(200);
            clr();
        }
    }

    function pickNext() {
        if(playlist.length===0) playlist = [...catalog].sort(()=>Math.random()-0.5);
        spawn(playlist.pop());
    }

    function animate() {
        requestAnimationFrame(animate);
        if(warping) { universeGroup.position.z += (1500-universeGroup.position.z)*0.1; starSpd=65; }
        else { 
            universeGroup.position.z += (0-universeGroup.position.z)*0.05; starSpd=0.5;
            universeGroup.rotation.y += (ry-universeGroup.rotation.y)*0.1 + 0.003;
            universeGroup.rotation.x += (rx-universeGroup.rotation.x)*0.1;
        }
        const pA = stars.geometry.attributes.position.array;
        for(let i=0; i<pA.length; i+=3) { pA[i+2]+=starSpd; if(pA[i+2]>500) pA[i+2]=-4000; }
        stars.geometry.attributes.position.needsUpdate=true;
        renderer.render(scene, camera);
    }
    init();
</script>
</body>
</html>
